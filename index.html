<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i-rCQI — Sistem Pelaporan CQI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --primary: #185FA5;
    --primary-light: #E6F1FB;
    --primary-mid: #378ADD;
    --success: #3B6D11;
    --success-light: #EAF3DE;
    --danger: #A32D2D;
    --danger-light: #FCEBEB;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --gray: #5F5E5A;
    --gray-light: #F1EFE8;
    --text: #1a1a1a;
    --text-muted: #5F5E5A;
    --border: rgba(0,0,0,0.12);
    --bg2: #F8F9FA;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F0F4F8; color: var(--text); font-size: 15px; }

  .topbar { background: var(--primary); color: #fff; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .topbar-brand { font-size: 18px; font-weight: 700; }
  .topbar-brand span { opacity: 0.7; font-weight: 400; font-size: 13px; margin-left: 8px; }
  .topbar-user { font-size: 13px; opacity: 0.9; display: flex; align-items: center; gap: 8px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; }

  #login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #E6F1FB 0%, #F0F4F8 100%); }
  .login-card { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(24,95,165,0.12); }
  .login-logo { text-align: center; margin-bottom: 1.5rem; }
  .login-logo h1 { font-size: 28px; font-weight: 800; color: var(--primary); }
  .login-logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .login-card label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .login-card input, .login-card select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; }
  .login-card input:focus, .login-card select:focus { border-color: var(--primary-mid); box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  .btn-primary { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 11px 20px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 1rem; }
  .btn-primary:hover { background: #0C447C; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-err { color: var(--danger); font-size: 13px; margin-top: 8px; text-align: center; display: none; }
  .login-loading { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 8px; display: none; }
  .form-group { margin-bottom: 1rem; }

  #app { display: none; }
  .layout { display: flex; min-height: calc(100vh - 56px); }
  .sidebar { width: 220px; background: #fff; border-right: 1px solid var(--border); padding: 1.5rem 0; flex-shrink: 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 1.5rem; font-size: 14px; color: var(--text-muted); cursor: pointer; border-left: 3px solid transparent; }
  .nav-item:hover { background: var(--primary-light); color: var(--primary); }
  .nav-item.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
  .nav-icon { font-size: 18px; width: 22px; text-align: center; }
  .nav-sep { font-size: 11px; color: var(--text-muted); padding: 1rem 1.5rem 0.4rem; text-transform: uppercase; letter-spacing: 0.8px; }
  .main { flex: 1; padding: 2rem; overflow-y: auto; max-width: 1100px; }

  .page { display: none; }
  .page.active { display: block; }
  .page-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }

  .card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--primary-light); padding-bottom: 8px; }
  .card-num { display: inline-block; background: var(--primary); color: #fff; width: 22px; height: 22px; border-radius: 50%; text-align: center; line-height: 22px; font-size: 11px; margin-right: 8px; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 1rem 1.25rem; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { display: block; font-size: 13px; color: var(--text-muted); font-weight: 500; margin-bottom: 5px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 14px; outline: none; background: #fff; color: var(--text); }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary-mid); box-shadow: 0 0 0 3px rgba(55,138,221,0.12); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--bg2); color: var(--text-muted); font-weight: 600; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--primary-light); }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .tag-blue { background: var(--primary-light); color: var(--primary); }
  .tag-green { background: var(--success-light); color: var(--success); }
  .tag-amber { background: var(--amber-light); color: var(--amber); }
  .tag-red { background: var(--danger-light); color: var(--danger); }
  .tag-gray { background: var(--gray-light); color: var(--gray); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
  .btn-blue { background: var(--primary); color: #fff; }
  .btn-blue:hover { background: #0C447C; }
  .btn-blue:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--bg2); }
  .btn-green { background: var(--success); color: #fff; }
  .btn-red { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }

  .repeat-row { display: grid; gap: 8px; align-items: center; margin-bottom: 8px; }
  .repeat-row input, .repeat-row select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; width: 100%; }
  .repeat-header { display: grid; gap: 8px; margin-bottom: 6px; }
  .repeat-header span { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

  .grade-row { grid-template-columns: repeat(14, 1fr) 90px; }
  .clo-row { grid-template-columns: 70px 1.6fr 1fr 1fr 1fr 1fr 70px; }
  .plo-row { grid-template-columns: 70px 1.6fr 1fr 1fr 1fr 1fr 70px; }
  .lecturer-row { grid-template-columns: 1fr 60px; }

  .sig-wrap { border: 1px solid var(--border); border-radius: 8px; background: #FAFAFA; position: relative; max-width: 500px; }
  canvas.sig-canvas { display: block; cursor: crosshair; border-radius: 8px; width: 100%; }
  .sig-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--text-muted); font-size: 13px; pointer-events: none; opacity: 0.6; }
  .sig-actions { display: flex; gap: 8px; margin-top: 8px; }

  .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
  .alert-success { background: var(--success-light); color: var(--success); border: 1px solid #C0DD97; }
  .alert-info { background: var(--primary-light); color: var(--primary); border: 1px solid #B5D4F4; }
  .alert-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #F09595; }
  .alert-amber { background: var(--amber-light); color: var(--amber); border: 1px solid #FAC775; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 2rem 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 2rem; width: 100%; max-width: 760px; }
  .modal.modal-sm { max-width: 480px; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; position: sticky; bottom: 0; background: #fff; padding-top: 1rem; }

  .section-block { border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; background: #FCFCFC; }

  .file-drop { border: 2px dashed var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; cursor: pointer; background: #FAFAFA; }
  .file-drop:hover { border-color: var(--primary-mid); background: var(--primary-light); }
  .file-drop.has-file { border-color: var(--success); background: var(--success-light); border-style: solid; }
  .file-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; padding: 6px 0; }
  .file-link { color: var(--primary); text-decoration: none; }
  .file-link:hover { text-decoration: underline; }

  .status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .progress-steps { display: flex; align-items: center; gap: 0; margin-bottom: 1.5rem; }
  .progress-step { flex: 1; text-align: center; font-size: 11px; color: var(--text-muted); position: relative; padding-bottom: 8px; }
  .progress-step::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--border); border-radius: 2px; }
  .progress-step.done::after { background: var(--success); }
  .progress-step.active::after { background: var(--primary-mid); }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-dark { border: 2px solid rgba(24,95,165,0.2); border-top-color: var(--primary); }

  .toast-wrap { position: fixed; top: 70px; right: 1.5rem; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: #fff; border-radius: 8px; padding: 10px 16px; font-size: 13px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); border-left: 4px solid var(--primary); min-width: 240px; animation: slideIn 0.25s ease; }
  .toast.toast-success { border-left-color: var(--success); }
  .toast.toast-error { border-left-color: var(--danger); }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
  .empty-state-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.5; }

  @media (max-width: 700px) {
    .form-grid, .form-grid3 { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .grade-row { grid-template-columns: repeat(7, 1fr); }
  }

  .hidden { display: none !important; }
  .mt-1 { margin-top: 0.5rem; }
  .mt-2 { margin-top: 1rem; }
  .mb-0 { margin-bottom: 0 !important; }
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .text-muted { color: var(--text-muted); }
  .text-sm { font-size: 13px; }
</style>
</head>
<body>

<div class="toast-wrap" id="toast-wrap"></div>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>i-rCQI</h1>
      <p>Sistem Pelaporan iCQI Bersepadu</p>
    </div>
    <div class="form-group">
      <label>No. Staf</label>
      <input type="text" id="ic-input" placeholder="cth: STF12345" maxlength="20" style="text-transform:uppercase;">
    </div>
    <div class="form-group">
      <label>Peranan</label>
      <select id="role-select">
        <option value="penyelaras">Penyelaras Kursus</option>
        <option value="ketua">Ketua Program</option>
        <option value="admin">Pentadbir</option>
      </select>
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Log Masuk</button>
    <p class="login-loading" id="login-loading">Mengesahkan...</p>
    <p class="login-err" id="login-err"></p>
  </div>
</div>

<!-- APP SHELL -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">i-rCQI <span>Sistem Pelaporan iCQI</span></div>
    <div class="topbar-user">
      <span id="user-name-top"></span>
      <div class="avatar" id="user-avatar"></div>
      <button onclick="doLogout()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;">Keluar</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main-content"></div>
  </div>
</div>

<div id="modal-root"></div>

<script src="app.js"></script>
</body>
</html>
